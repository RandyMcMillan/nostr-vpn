name: Nostr VPN
summary: Mesh VPN built on Nostr signaling and userspace WireGuard.
description: |
  Nostr VPN is a Tailscale-style mesh VPN for your own devices and trusted peers.

  It uses Nostr for peer discovery and encrypted signaling, and userspace
  WireGuard for the actual tunnel.

  Current app capabilities include:
  - private mesh networking between approved participants
  - invite and join flows in the GUI
  - exit nodes and route advertisement
  - MagicDNS-style naming inside the mesh

